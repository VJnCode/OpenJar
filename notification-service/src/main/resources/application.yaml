server:
  port: 8088


eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

spring:
  application:
    name: notification-service


  datasource:
    url: jdbc:mysql://localhost:3306/notification_service
    username: root
    password: ROOT
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Database Configuration
#  datasource:
#    url: ${DB_URL:jdbc:mysql://localhost:3306/openjar_notification}
#    username: ${DB_USER:root}
#    password: ${DB_PASS:1234}
#    driver-class-name: com.mysql.cj.jdbc.Driver



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # RabbitMQ Configuration
  RabbitMQ:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3
          multiplier: 2.0

  # Email Configuration (SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER:vjcodes247@gmail.com}
    password: ${MAIL_PASS:tunkpiqvzmfngkup}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

