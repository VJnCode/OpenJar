<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .email-card { font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: auto; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header { background: #ff5722; color: white; padding: 20px; text-align: center; }
        .body { padding: 30px; color: #444; line-height: 1.6; }
        .comment-box { background: #f9f9f9; padding: 15px; border-left: 4px solid #ff5722; margin: 20px 0; font-style: italic; }
        .footer { font-size: 12px; color: #999; text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="email-card">
    <div class="header">
        <h1>OpenJar Social</h1>
    </div>
    <div class="body">
        <p>Hi Chef,</p>
        <p>Your recipe <strong>[[${recipeName}]]</strong> is getting some love! Someone just left a comment:</p>

        <div class="comment-box">
            "[[${commentContent}]]"
        </div>

        <p>Head over to OpenJar to join the conversation!</p>
        <p>Happy Cooking,<br><strong>The OpenJar Team</strong></p>
    </div>
    <div class="footer">
        Sent from OpenJar Microservices • 2026
    </div>
</div>
</body>
</html>
