services:
  # Infrastructure: Database
  openjar-db:
    image: mysql:8.0
    container_name: openjar-db
    environment:
      MYSQL_DATABASE: OpenJar
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Infrastructure: Service Discovery
  eureka-server:
    build: ./eureka
    container_name: eureka-server
    ports:
      - "8761:8761"

  # Infrastructure: Identity Provider
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://openjar-db:3306/OpenJar
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_AUTHORIZATIONSERVER_ISSUER: http://user-service:8086
    depends_on:
      openjar-db:
        condition: service_healthy

  # Infrastructure: API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OPENJAR_ISSUER_URI: http://user-service:8086
    depends_on:
      - eureka-server
      - user-service

  # Business: Recipe Management
  recipe-service:
    build: ./recipe-service
    container_name: recipe-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://openjar-db:3306/OpenJar
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://user-service:8086
    depends_on:
      - openjar-db
      - eureka-server

  # Business: Social Features
  social-service:
    build: ./social-service
    container_name: social-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://user-service:8086
    depends_on:
      - eureka-server

  # Business: Notifications
  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server

networks:
  default:
    name: openjar-network