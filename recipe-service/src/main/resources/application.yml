spring:
  application:
    name: recipe-service

  datasource:
    url: jdbc:mysql://localhost:3306/RecipeService
    username: root
    password: ROOT

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mvc:
    static-path-pattern: /uploads/**

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


server:
  port: 8082

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: 127.0.0.1
    instance-id: recipe-service:8082
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /recipe/v3/api-docs