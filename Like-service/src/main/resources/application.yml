spring:
  application:
    name: Like-service

  datasource:
    url: jdbc:mysql://localhost:3306/LikeInteraction
    username: root
    password: ROOT

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mvc:
    static-path-pattern: /uploads/**

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    error:
      include-message: always
      include-binding-errors: always
      include-stacktrace: always

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/