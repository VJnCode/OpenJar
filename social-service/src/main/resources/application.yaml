server:
  port: 8087

spring:
  application:
    name: social-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/openjar_social}
    username: ${DB_USER:root}
    password: ${DB_PASS:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # RabbitMQ connection for the producer
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs