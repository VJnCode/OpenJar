server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: user-service
  datasource:
    # This checks for SPRING_DATASOURCE_URL env var, otherwise defaults to localhost
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/OpenJar?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      # This is the critical fix for the logs you're seeing
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}