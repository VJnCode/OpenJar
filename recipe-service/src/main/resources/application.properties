spring.application.name=recipe-service

spring.datasource.url=jdbc:mysql://localhost:3306/RecipeService
spring.datasource.username=root
spring.datasource.password=ROOT
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.show-sql=true

#shows the queries run by the terminal
spring.jpa.show-sql=true 
spring.mvc.static-path-pattern=/uploads/**
logging.level.org.springframework.security=DEBUG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.root=INFO
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=always


spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest