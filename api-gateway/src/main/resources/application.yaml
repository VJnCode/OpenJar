server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: recipe-service
          uri: lb://RECIPE-SERVICE
          predicates:
            - Path=/recipe/**

        - id: social-service
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/api/social/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # This forces the Gateway to use IP addresses, which is much more stable
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG